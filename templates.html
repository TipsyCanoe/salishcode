// ── TEMPLATES INDEX ───────────────────────────────────────────────────────────
const TEMPLATES = [
  { id:1, name:"Diagonal Split",   tag:"Dark hero · Vertical nav",      Component: T1 },
  { id:2, name:"Editorial",        tag:"Light · Alternating rows",       Component: T2 },
  { id:3, name:"Bento Grid",       tag:"Dark · All tiles · No hero",     Component: T3 },
  { id:4, name:"Left Sidebar",     tag:"Light · Fixed nav column",       Component: T4 },
  { id:5, name:"Magazine Overlap", tag:"Dark hero · Floating cards",     Component: T5 },
];

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [activeT, setActiveT] = React.useState(0);
  const [activePalette, setActivePalette] = React.useState("forest");
  const { Component } = TEMPLATES[activeT];
  const palette = PALETTES[activePalette];
  const cssVars = Object.fromEntries(
    Object.entries(palette).filter(([k]) => k.startsWith("--"))
  );

  return (
    <div style={{ background:"#080808", minHeight:"100vh", display:"flex", flexDirection:"column" }}>
      <div style={{
        position:"sticky", top:0, zIndex:1000,
        background:"#0c0c0c",
        borderBottom:"1px solid #222",
        padding:"0.6rem 1rem",
        display:"flex", flexWrap:"wrap", gap:"0.75rem", alignItems:"center",
      }}>
        <div style={{display:"flex", gap:"0.4rem", flexWrap:"wrap"}}>
          {TEMPLATES.map((t,i)=>(
            <button key={t.id} onClick={()=>setActiveT(i)} style={{
              padding:"0.35rem 0.9rem",
              border: activeT===i ? "1px solid #4a9" : "1px solid #2a2a2a",
              background: activeT===i ? "rgba(50,160,100,0.12)" : "transparent",
              color: activeT===i ? "#4a9" : "#555",
              borderRadius:"3px", cursor:"pointer", fontSize:"0.72rem", whiteSpace:"nowrap",
            }}>
              <strong style={{color:activeT===i?"#4a9":"#666"}}>{t.id}.</strong> {t.name}
              <span style={{display:"block", fontSize:"0.58rem", color:activeT===i?"#3a7":"#333", marginTop:"1px"}}>{t.tag}</span>
            </button>
          ))}
        </div>
        <div style={{width:"1px", height:"32px", background:"#2a2a2a", flexShrink:0}} />
        <div style={{display:"flex", gap:"0.4rem", alignItems:"center"}}>
          <span style={{fontSize:"0.6rem", color:"#444", letterSpacing:"0.15em", textTransform:"uppercase", marginRight:"0.25rem"}}>Palette</span>
          {Object.entries(PALETTES).map(([key, pal])=>(
            <button key={key} onClick={()=>setActivePalette(key)} style={{
              padding:"0.3rem 0.85rem",
              border: activePalette===key ? `1px solid ${pal["--p-accent"]}` : "1px solid #2a2a2a",
              background: activePalette===key ? `${pal["--p-accent"]}22` : "transparent",
              color: activePalette===key ? pal["--p-accent"] : "#555",
              borderRadius:"3px", cursor:"pointer", fontSize:"0.72rem",
              display:"flex", alignItems:"center", gap:"0.35rem",
            }}>
              <span style={{width:"10px", height:"10px", borderRadius:"50%", background:pal["--p-accent"], display:"inline-block", flexShrink:0}}/>
              {pal.emoji} {pal.name}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1, ...cssVars}}>
        <Component />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
